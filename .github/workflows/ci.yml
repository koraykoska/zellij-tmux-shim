name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Runs on every PR and push (and on tags, before build/release).
  test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked

  # Only on a version tag: cross-build release binaries for the three targets.
  build:
    name: build ${{ matrix.target }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # x86_64-musl builds natively on the x86_64 runner (no cross tool needed).
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      # aarch64-musl is cross-compiled with zig (bundles its own musl toolchain).
      - name: Set up Zig
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: mlugg/setup-zig@v2
      - name: Install cargo-zigbuild
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            cargo zigbuild --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
      - name: Package
        run: |
          dist="zellij-tmux-shim-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/tmux" "$dist/tmux"
          cp shell/zellij-tmux-shim.sh "$dist/zellij-tmux-shim.sh"
          tar -czf "$dist.tar.gz" -C "$dist" tmux zellij-tmux-shim.sh
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$dist.tar.gz" > "$dist.tar.gz.sha256"
          else
            shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            zellij-tmux-shim-${{ matrix.target }}.tar.gz
            zellij-tmux-shim-${{ matrix.target }}.tar.gz.sha256

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          # A hyphen in the tag (e.g. v1.0.0-rc1) marks a prerelease, so GitHub
          # keeps /releases/latest pointing at the last stable (protects install.sh).
          prerelease: ${{ contains(github.ref_name, '-') }}
      - name: Bump Homebrew formula (version + sha256) and commit
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          getsha() { awk '{print $1}' "dist/zellij-tmux-shim-$1.tar.gz.sha256"; }
          export FVERSION="$version"
          export SHA_DARWIN_ARM="$(getsha aarch64-apple-darwin)"
          export SHA_LINUX_ARM="$(getsha aarch64-unknown-linux-musl)"
          export SHA_LINUX_X86="$(getsha x86_64-unknown-linux-musl)"
          ruby -i -pe '
            $t = $1 if $_ =~ %r{releases/download/[^"]*zellij-tmux-shim-([a-z0-9_-]+)\.tar\.gz}
            if $_ =~ /^(\s*version ")[^"]*(")/
              $_ = "#{$1}#{ENV["FVERSION"]}#{$2}\n"
            elsif $_ =~ /^(\s*sha256 ")[0-9a-f]{64}(")/ && $t
              m = {"aarch64-apple-darwin" => ENV["SHA_DARWIN_ARM"],
                   "aarch64-unknown-linux-musl" => ENV["SHA_LINUX_ARM"],
                   "x86_64-unknown-linux-musl" => ENV["SHA_LINUX_X86"]}
              $_ = "#{$1}#{m[$t]}#{$2}\n" if m[$t]
              $t = nil
            end
          ' Formula/zellij-tmux-shim.rb
          if ! git diff --quiet -- Formula/zellij-tmux-shim.rb; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Formula/zellij-tmux-shim.rb
            git commit -m "chore(release): update Homebrew formula for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi
